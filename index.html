<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Shop — Catálogo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #080808;
      --dark: #0f0f0f;
      --card: #141414;
      --border: rgba(255,255,255,0.07);
      --cyan: #00e5ff;
      --cyan-glow: rgba(0,229,255,0.25);
      --text: #f0f0f0;
      --muted: #777;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
    body { font-family: 'Outfit', sans-serif; background: var(--black); color: var(--text); overflow-x: hidden; }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 60px;
    }
    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: brightness(0.75);
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(8,8,8,0.1) 0%,
        rgba(8,8,8,0.05) 40%,
        rgba(8,8,8,0.7) 75%,
        rgba(8,8,8,1) 100%
      );
    }
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      animation: fadeUp 1s ease both;
    }
    .hero-tagline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      letter-spacing: 6px;
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan);
      margin-bottom: 12px;
    }
    .hero-sub {
      font-size: 1rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 2px;
      font-weight: 300;
      margin-bottom: 28px;
    }
    .hero-cta {
      display: inline-block;
      padding: 14px 36px;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .hero-cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--cyan);
      transform: translateX(-100%);
      transition: transform 0.3s;
      z-index: -1;
    }
    .hero-cta:hover { color: #000; }
    .hero-cta:hover::before { transform: translateX(0); }
    .scroll-hint {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0.5;
      animation: bounce 2s infinite;
    }
    .scroll-hint span { font-size: 0.65rem; letter-spacing: 3px; }
    .scroll-hint svg { width: 18px; height: 18px; }

    /* ─── STICKY NAV ─── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
    }
    .nav-inner {
      max-width: 1300px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      gap: 1rem;
    }
    .nav-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--cyan);
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--cyan-glow);
      white-space: nowrap;
    }
    .nav-search {
      flex: 1;
      max-width: 360px;
      position: relative;
    }
    .nav-search input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px 8px 38px;
      border-radius: 6px;
      outline: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.88rem;
      transition: 0.3s;
    }
    .nav-search input:focus { border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan-glow); }
    .nav-search .icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ─── CATEGORIES ─── */
    .categories-wrap {
      max-width: 1300px;
      margin: 40px auto 0;
      padding: 0 1.5rem;
    }
    .section-label {
      font-size: 0.7rem;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .categories {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .cat-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 1px;
      transition: all 0.25s;
      font-weight: 500;
    }
    .cat-btn:hover, .cat-btn.active {
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 14px var(--cyan-glow);
    }

    /* ─── STATS ─── */
    .stats {
      max-width: 1300px;
      margin: 32px auto;
      padding: 0 1.5rem;
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; }
    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--cyan);
      line-height: 1;
    }
    .stat-lbl { font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }

    /* ─── GRID ─── */
    .grid-wrap {
      max-width: 1300px;
      margin: 0 auto 80px;
      padding: 0 1.5rem;
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
    }

    /* ─── CARD ─── */
    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      animation: fadeUp 0.5s ease both;
    }
    .product-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0,229,255,0.3);
      box-shadow: 0 12px 40px rgba(0,229,255,0.1);
    }
    .product-carousel { position: relative; width: 100%; height: 260px; overflow: hidden; cursor: zoom-in; }
    .carousel-track { display: flex; height: 100%; transition: transform 0.3s ease; }
    .carousel-slide { min-width: 100%; height: 100%; }
    .carousel-slide img, .carousel-slide video { width: 100%; height: 100%; object-fit: cover; }
    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.65); color: #fff; border: none;
      width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
      font-size: 1rem; z-index: 10; display: flex; align-items: center; justify-content: center;
      transition: 0.2s;
    }
    .carousel-btn:hover { background: var(--cyan); color: #000; }
    .carousel-btn.prev { left: 8px; }
    .carousel-btn.next { right: 8px; }
    .carousel-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
    .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: 0.2s; }
    .carousel-dot.active { background: var(--cyan); }
    .media-count { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: #fff; padding: 3px 7px; border-radius: 4px; font-size: 0.7rem; }
    .badge {
      position: absolute; top: 8px; left: 8px;
      background: var(--cyan); color: #000;
      font-size: 0.65rem; padding: 3px 8px;
      border-radius: 3px; font-weight: 700; letter-spacing: 1px;
    }
    .product-info { padding: 1rem; }
    .product-name { font-size: 0.95rem; font-weight: 600; line-height: 1.3; }
    .product-desc { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
    .product-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--cyan);
      margin-top: 10px;
      letter-spacing: 1px;
    }
    .wa-btn {
      display: block;
      margin-top: 12px;
      background: linear-gradient(90deg, #25D366, #128C7E);
      color: #fff;
      text-align: center;
      text-decoration: none;
      padding: 9px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: 0.25s;
    }
    .wa-btn:hover { opacity: 0.9; transform: scale(1.02); box-shadow: 0 4px 20px rgba(37,211,102,0.3); }

    /* ─── MODAL ─── */
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
      z-index: 300; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-inner { position: relative; max-width: 90vw; max-height: 90vh; }
    .modal-inner img, .modal-inner video { max-width: 90vw; max-height: 85vh; border-radius: 10px; display: block; }
    .modal-close { position: absolute; top: -36px; right: 0; color: #fff; font-size: 1.8rem; cursor: pointer; line-height: 1; }
    .modal-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); color: #fff; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 1.4rem; transition: 0.2s; }
    .modal-nav:hover { background: var(--cyan); color: #000; }
    .modal-nav.prev { left: -56px; }
    .modal-nav.next { right: -56px; }

    /* ─── FLOAT ─── */
    .wa-float {
      position: fixed; bottom: 24px; right: 24px;
      background: #25D366; border-radius: 50%;
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; text-decoration: none;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4);
      transition: 0.3s; z-index: 200;
    }
    .wa-float:hover { transform: scale(1.1); }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 1px;
    }
    footer span { color: var(--cyan); }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(6px); }
    }

    /* ─── EMPTY / LOADING ─── */
    .loading, .empty { grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.8s linear infinite; margin: auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .product-carousel { height: 200px; }
      .modal-nav.prev { left: 8px; }
      .modal-nav.next { right: 8px; }
      .stats { gap: 24px; }
    }
  </style>
</head>

<script>
const CONFIG = { whatsappNumbers: ['573214885822'], autoRefreshSeconds: 30 };
let allProducts = [], filtered = [], currentCat = 'todos';
let modalMedia = [], modalIdx = 0;

document.addEventListener('DOMContentLoaded', () => { loadProducts(); setupSearch(); setInterval(loadProducts, CONFIG.autoRefreshSeconds * 1000); });

async function loadProducts() {
  try {
    const res = await fetch('productos.json?t=' + Date.now());
    allProducts = await res.json();
    filtered = [...allProducts];
    render();
  } catch(e) { showEmpty(); }
}

function getMedia(p) {
  let m = [];
  if (p.imagen) m.push({ type:'image', url:p.imagen });
  (p.imagenes||[]).forEach(u => m.push({ type:'image', url:u }));
  (p.videos||[]).forEach(u => m.push({ type:'video', url:u }));
  return m;
}

function fmtPrice(p) { return parseInt(p).toLocaleString('es-CO') + ' COP'; }

function render() {
  const grid = document.getElementById('productsGrid');
  document.getElementById('productCount').textContent = filtered.length;
  if (!filtered.length) { showEmpty(); return; }
  grid.innerHTML = '';
  filtered.forEach((prod, idx) => {
    const media = getMedia(prod);
    const card = document.createElement('div');
    card.className = 'product-card';
    card.style.animationDelay = (idx * 0.04) + 's';
    const slides = media.length ? media.map((m,i) => `
      <div class="carousel-slide">
        ${m.type==='video'
          ? `<video src="${m.url}" muted loop playsinline></video>`
          : `<img src="${m.url}" alt="${prod.nombre}" loading="lazy">`}
      </div>`).join('') : `<div class="carousel-slide" style="display:flex;align-items:center;justify-content:center;background:#1a1a1a;font-size:3rem;">👟</div>`;
    const dots = media.length > 1 ? `<div class="carousel-dots" id="dots-${idx}">${media.map((_,i)=>`<div class="carousel-dot${i===0?' active':''}" onclick="cGo(${idx},${i})"></div>`).join('')}</div>` : '';
    card.innerHTML = `
      <div class="product-carousel" data-idx="${idx}">
        ${media.length>1?`<button class="carousel-btn prev" onclick="cPrev(${idx})">‹</button>`:''}
        <div class="carousel-track" id="track-${idx}">${slides}</div>
        ${media.length>1?`<button class="carousel-btn next" onclick="cNext(${idx})">›</button>`:''}
        ${dots}
        ${media.length>1?`<div class="media-count">📷 ${media.length}</div>`:''}
        <div class="badge">PREMIUM</div>
      </div>
      <div class="product-info">
        <div class="product-name">${prod.nombre}</div>
        ${prod.descripcion?`<div class="product-desc">${prod.descripcion}</div>`:''}
        <div class="product-price">${fmtPrice(prod.precio)}</div>
        ${prod.tallas?`<div style="color:var(--muted);font-size:.8rem;margin-top:4px;">📏 ${prod.tallas}</div>`:''}
        <a href="#" class="wa-btn" onclick="event.preventDefault();consultar('${prod.nombre}','${prod.precio}','${prod.tallas||''}')">💬 Consultar por WhatsApp</a>
      </div>`;
    card.querySelector('.carousel-track').onclick = () => openModal(media, 0);
    grid.appendChild(card);
  });
}

window._cPos = {};
function cGo(idx, pos) {
  const track = document.getElementById('track-'+idx);
  const dots = document.getElementById('dots-'+idx);
  if (!track) return;
  pos = Math.max(0, Math.min(pos, track.children.length-1));
  _cPos[idx] = pos;
  track.style.transform = `translateX(-${pos*100}%)`;
  if (dots) dots.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active', i===pos));
  track.querySelectorAll('video').forEach(v=>v.pause());
  const vid = track.children[pos]?.querySelector('video');
  if (vid) vid.play();
}
function cNext(idx) { cGo(idx, (_cPos[idx]||0)+1); }
function cPrev(idx) { cGo(idx, (_cPos[idx]||0)-1); }

function openModal(media, idx) {
  if (!media?.length) return;
  modalMedia = media; modalIdx = idx;
  showModalMedia();
  document.getElementById('modal').classList.add('active');
}
function showModalMedia() {
  const img = document.getElementById('modalImg');
  const vid = document.getElementById('modalVid');
  const cur = modalMedia[modalIdx];
  if (cur.type==='video') { img.style.display='none'; vid.style.display='block'; vid.src=cur.url; vid.play(); }
  else { vid.pause(); vid.style.display='none'; img.style.display='block'; img.src=cur.url; }
}
function modalNext() { modalIdx=(modalIdx+1)%modalMedia.length; showModalMedia(); }
function modalPrev() { modalIdx=(modalIdx-1+modalMedia.length)%modalMedia.length; showModalMedia(); }
function closeModal() { document.getElementById('modal').classList.remove('active'); document.getElementById('modalVid').pause(); }
document.getElementById('modal').onclick = e => { if(e.target===e.currentTarget) closeModal(); };

function filterCategory(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtered = cat==='todos' ? [...allProducts] : allProducts.filter(p=>(p.categoria||'').toLowerCase()===cat);
  render();
}

function setupSearch() {
  document.getElementById('searchInput').addEventListener('input', e => {
    const t = e.target.value.toLowerCase();
    filtered = allProducts.filter(p => p.nombre.toLowerCase().includes(t) || (p.descripcion||'').toLowerCase().includes(t));
    if (currentCat!=='todos') filtered = filtered.filter(p=>(p.categoria||'').toLowerCase()===currentCat);
    render();
  });
}

function consultar(n,p,t) {
  const phone = CONFIG.whatsappNumbers[0];
  const msg = `Hola! Estoy interesado en *${n}*.\nPrecio: ${fmtPrice(p)}${t?`\nTallas: ${t}`:\'\'}.\n¿Está disponible?`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}
function contactar(e) {
  e.preventDefault();
  window.open(`https://wa.me/${CONFIG.whatsappNumbers[0]}?text=${encodeURIComponent('Hola! Vi su catálogo y quiero más información.')}`, '_blank');
}
function showEmpty() {
  document.getElementById('productsGrid').innerHTML = `<div class="empty"><p style="font-size:3rem">📦</p><p style="margin-top:1rem">Sin productos en esta categoría</p></div>`;
}
